name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish packages to NuGet (requires nuget-prod environment approval)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: restore local tools
        run: dotnet tool restore

      - name: prepare artifact directories
        run: mkdir -p artifacts/packages artifacts/sbom artifacts/security

      - name: restore
        run: dotnet restore StateMachineLibrary.sln

      - name: build
        run: dotnet build StateMachineLibrary.sln --configuration Release --no-restore

      - name: test
        run: dotnet test --solution StateMachineLibrary.sln --configuration Release --no-build

      - name: dependency vulnerability report
        run: dotnet list StateMachineLibrary.sln package --vulnerable --include-transitive --format json > artifacts/security/vulnerabilities.json

      - name: enforce vulnerability gate
        run: python3 eng/check-vulnerabilities.py artifacts/security/vulnerabilities.json

      - name: pack
        run: dotnet pack StateMachineLibrary.sln --configuration Release --no-build --output artifacts/packages

      - name: generate cyclonedx sbom
        run: dotnet CycloneDX StateMachineLibrary.sln --configuration Release --exclude-test-projects --output-format Json --output artifacts/sbom --filename StateMachineLibrary.cdx.json

      - name: upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-release-candidates
          path: artifacts/packages/*

      - name: upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-supply-chain-evidence
          path: |
            artifacts/sbom/*
            artifacts/security/*

  publish-nuget:
    needs: build-artifacts
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment: nuget-prod
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-release-candidates
          path: artifacts/packages

      - name: download security artifacts
        uses: actions/download-artifact@v4
        with:
          name: security-supply-chain-evidence
          path: artifacts

      - name: validate signing and publish secrets
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SIGN_CERT_PFX_B64: ${{ secrets.NUGET_SIGN_CERT_PFX_B64 }}
          NUGET_SIGN_CERT_PASSWORD: ${{ secrets.NUGET_SIGN_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY is required in nuget-prod environment" >&2
            exit 1
          fi

          if [ -z "${NUGET_SIGN_CERT_PFX_B64:-}" ]; then
            echo "NUGET_SIGN_CERT_PFX_B64 is required in nuget-prod environment" >&2
            exit 1
          fi

          if [ -z "${NUGET_SIGN_CERT_PASSWORD:-}" ]; then
            echo "NUGET_SIGN_CERT_PASSWORD is required in nuget-prod environment" >&2
            exit 1
          fi

      - name: author-sign packages
        env:
          NUGET_SIGN_CERT_PFX_B64: ${{ secrets.NUGET_SIGN_CERT_PFX_B64 }}
          NUGET_SIGN_CERT_PASSWORD: ${{ secrets.NUGET_SIGN_CERT_PASSWORD }}
          NUGET_TIMESTAMP_URL: ${{ secrets.NUGET_TIMESTAMP_URL }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          nupkgs=(artifacts/packages/*.nupkg)
          if [ ${#nupkgs[@]} -eq 0 ]; then
            echo "No .nupkg files found to sign" >&2
            exit 1
          fi

          cert_path="$(mktemp -u).pfx"
          trap 'rm -f "$cert_path"' EXIT

          umask 077
          echo "$NUGET_SIGN_CERT_PFX_B64" | base64 --decode > "$cert_path"

          timestamp_url="${NUGET_TIMESTAMP_URL:-http://timestamp.digicert.com}"
          dotnet nuget sign "${nupkgs[@]}" \
            --certificate-path "$cert_path" \
            --certificate-password "$NUGET_SIGN_CERT_PASSWORD" \
            --timestamper "$timestamp_url" \
            --hash-algorithm SHA256 \
            --timestamp-hash-algorithm SHA256 \
            --overwrite

      - name: verify signed packages
        run: |
          set -euo pipefail
          shopt -s nullglob

          nupkgs=(artifacts/packages/*.nupkg)
          if [ ${#nupkgs[@]} -eq 0 ]; then
            echo "No .nupkg files found to verify" >&2
            exit 1
          fi

          dotnet nuget verify --all "${nupkgs[@]}"

      - name: attest signed nuget packages provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/packages/*

      - name: attest sbom provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/sbom/StateMachineLibrary.cdx.json

      - name: publish packages to nuget
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
        run: |
          set -euo pipefail
          shopt -s nullglob

          nupkgs=(artifacts/packages/*.nupkg)
          if [ ${#nupkgs[@]} -eq 0 ]; then
            echo "No .nupkg files found to publish" >&2
            exit 1
          fi

          dotnet nuget push "${nupkgs[@]}" \
            --source "$NUGET_SOURCE" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

          snupkgs=(artifacts/packages/*.snupkg)
          if [ ${#snupkgs[@]} -gt 0 ]; then
            dotnet nuget push "${snupkgs[@]}" \
              --source "$NUGET_SOURCE" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          else
            echo "No symbol packages (*.snupkg) found; skipping symbol publish."
          fi
